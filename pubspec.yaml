name: ada_titik
description: Ada Titik - Social Donation Mapping Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  flutter_screenutil: ^5.9.0

  # Navigation
  go_router: ^13.2.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Networking & Storage
  dio: ^5.7.0
  shared_preferences: ^2.3.2


  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.5
  image_picker: ^1.2.2

  # Location
  geolocator: ^11.0.0
  permission_handler: ^11.3.0

  # Notifikasi lokal (Android, iOS)
  flutter_local_notifications: ^17.2.3

  # Ikon
  cupertino_icons: ^1.0.8


  supabase_flutter: ^2.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"

  assets:
    - assets/images/
    - assets/icons/
